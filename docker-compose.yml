# Default: infrastructure only — `docker compose up -d`
# Full stack (API in Docker): `docker compose --profile app up -d --build`
#
# Apply DB migrations after Postgres is healthy (from host):
#   npm run db:migrate
#
# Web + worker: run on the host (`npm run dev:web`, `npm run dev:worker`) until Dockerfiles exist.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lexora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lexora}
      POSTGRES_DB: ${POSTGRES_DB:-lexora}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:11434/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  api:
    profiles: [app]
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-lexora}:${POSTGRES_PASSWORD:-lexora}@postgres:5432/${POSTGRES_DB:-lexora}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
